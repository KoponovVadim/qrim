{% extends "base.html" %}

{% block title %}Packs{% endblock %}

{% block content %}
<div class="row-between">
  <h2>Packs</h2>
  <a class="button" href="/packs/add">+ Add pack</a>
</div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Starter</th>
      <th>Producer</th>
      <th>Collector</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for p in packs %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.price_starter }}⭐</td>
      <td>{{ p.price_producer }}⭐</td>
      <td>{{ p.price_collector }}⭐</td>
      <td>
        <a class="button small" href="/packs/edit/{{ p.id }}">Edit</a>
        <form action="/packs/delete/{{ p.id }}" method="post" class="inline-form">
          <button class="button danger small" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2>Dashboard</h2>
<div class="cards">
  <div class="card">
    <h3>Products</h3>
    <p>{{ stats.products_count }}</p>
  </div>
  <div class="card">
    <h3>Purchases</h3>
    <p>{{ stats.purchases_count }}</p>
  </div>
  <div class="card">
    <h3>Pending</h3>
    <p>{{ stats.pending_purchases }}</p>
  </div>
  <div class="card">
    <h3>Stars Earned</h3>
    <p>{{ stats.stars_total }}</p>
  </div>
</div>
{% endblock %}

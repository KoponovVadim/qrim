{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2>Dashboard</h2>
<div class="cards">
  <div class="card">
    <h3>Packs</h3>
    <p>{{ stats.packs_count }}</p>
  </div>
  <div class="card">
    <h3>Purchases</h3>
    <p>{{ stats.purchases_count }}</p>
  </div>
  <div class="card">
    <h3>Revenue</h3>
    <p>{{ stats.revenue_stars }}⭐</p>
  </div>
</div>
{% endblock %}

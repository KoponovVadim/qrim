<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <h2>Login to Soundbot Admin</h2>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/login" method="post" class="form-grid">
      <label>Password</label>
      <input type="password" name="password" placeholder="WEB_PASSWORD" />

      <label>or Telegram ID</label>
      <input type="text" name="telegram_id" placeholder="123456789" />

      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
